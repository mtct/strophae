{% load i18n %}
{% load strophae %}
<div class="agent-card" style="width:392px;max-width:100%;background:#fff;border:1px solid #e6e7ea;border-radius:14px;padding:16px;">
  <div style="display:flex;align-items:center;gap:12px;">
    <button type="button" title="{% translate 'Change colour' %}"
            hx-post="{% url 'cycle_color' agent.id %}"
            hx-target="closest .agent-card" hx-swap="outerHTML"
            style="flex:none;width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;background:{{ agent.accent }};box-shadow:0 0 0 4px {{ agent.soft }};"></button>
    <input name="name" value="{{ agent.name }}" placeholder="{% translate 'Agent name' %}"
           hx-post="{% url 'update_agent' agent.id %}" hx-trigger="change, blur" hx-swap="none"
           style="flex:1;min-width:0;border:none;background:transparent;font-size:16px;font-weight:600;color:#1c1d20;outline:none;padding:4px 0;font-family:inherit;">
    <select name="model" title="{% translate 'Model' %}" aria-label="{% translate 'Model' %}" hx-post="{% url 'update_agent' agent.id %}" hx-trigger="change" hx-swap="none"
            style="flex:none;border:1px solid #e6e7ea;background:#fafafa;border-radius:8px;padding:6px 8px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#3a3b40;cursor:pointer;outline:none;">
      {% for m in models %}<option value="{{ m }}" {% if m == agent.model %}selected{% endif %}>{{ m }}</option>{% endfor %}
    </select>
    <button type="button" title="{% translate 'Remove' %}"
            hx-post="{% url 'remove_agent' agent.id %}" hx-target="closest .agent-card" hx-swap="delete"
            style="flex:none;width:30px;height:30px;border-radius:8px;border:1px solid #e6e7ea;background:#fff;color:#a3a4ab;cursor:pointer;font-size:17px;line-height:1;">×</button>
  </div>

  <textarea name="system_prompt" rows="2" placeholder="{% translate "System prompt — define this agent's role, tone and constraints…" %}"
            hx-post="{% url 'update_agent' agent.id %}" hx-trigger="change, blur" hx-swap="none"
            class="sc-textarea" style="margin-top:12px;">{{ agent.system_prompt }}</textarea>

  <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;align-items:center;">
    <span style="flex:1;"></span>
    <button type="button" hx-post="{% url 'save_persona' agent.id %}" hx-swap="none"
            class="sc-btn" style="padding:6px 11px;font-size:12.5px;">☆ {% translate "Save as persona" %}</button>
  </div>
</div>
