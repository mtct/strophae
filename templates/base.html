{% load static %}{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" data-theme="strophae">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}strophae{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          ink: '#1c1d20', muted: '#71727a', faint: '#aeaeb4', line: '#e6e7ea',
        },
        fontFamily: {
          sans: ["'Hanken Grotesk'", 'system-ui', 'sans-serif'],
          mono: ["'IBM Plex Mono'", 'monospace'],
        },
      } },
    };
  </script>

  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

  <style>
    :root { color-scheme: light; }
    body { margin:0; font-family:'Hanken Grotesk',system-ui,sans-serif; color:#1c1d20;
           background:oklch(0.985 0.003 255); font-size:14px; -webkit-font-smoothing:antialiased; }
    .mono { font-family:'IBM Plex Mono',monospace; }
    @keyframes scblink {0%,80%,100%{opacity:.2}40%{opacity:1}}
    @keyframes scfade {from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    @keyframes scpop {from{opacity:0;transform:translateY(-4px) scale(.98)}to{opacity:1;transform:none}}
    .scfade { animation:scfade .25s ease both; }
    .scpop { animation:scpop .14s ease both; }
    ::selection { background:oklch(0.9 0.05 255); }
    .sc-clamp { display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .sc-scroll::-webkit-scrollbar { width:9px;height:9px; }
    .sc-scroll::-webkit-scrollbar-thumb { background:#dcdce0;border-radius:8px;border:2px solid #fff; }

    /* Reusable building blocks mirroring the prototype's inline styles */
    .sc-card { background:#fff; border:1px solid #e6e7ea; border-radius:14px; }
    .sc-field { width:100%; border:1px solid #e6e7ea; background:#fafafa; border-radius:10px;
                padding:11px 13px; font-size:14px; color:#26272b; outline:none; font-family:inherit; }
    .sc-field:focus { border-color:#c7c9f0; background:#fff; }
    .sc-textarea { width:100%; border:1px solid #ececee; background:#fafafa; border-radius:10px;
                   padding:10px 12px; font-size:13px; line-height:1.5; color:#3a3b40; outline:none;
                   resize:vertical; font-family:inherit; }
    .sc-textarea:focus { border-color:#c7c9f0; background:#fff; }
    .sc-btn-dark { border:none; background:#1c1d20; color:#fff; border-radius:10px; padding:11px 18px;
                   font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
    .sc-btn-dark:disabled { opacity:.45; cursor:default; }
    .sc-btn { border:1px solid #e6e7ea; background:#fff; border-radius:9px; padding:7px 12px;
              font-size:13px; font-weight:500; color:#3a3b40; cursor:pointer; font-family:inherit; }
    .sc-btn:hover { background:#fafafa; }
    .sc-menu { background:#fff; border:1px solid #e6e7ea; border-radius:12px;
               box-shadow:0 12px 36px rgba(0,0,0,0.16); padding:6px; }
    .sc-menu button { display:block; width:100%; text-align:left; border:none; background:transparent;
                      border-radius:8px; padding:8px 10px; font-size:13px; color:#26272b; cursor:pointer;
                      font-family:inherit; }
    .sc-menu button:hover { background:#f4f4f6; }
    .logo-dots { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
    .logo-dots span { border-radius:50%; }
    [x-cloak] { display:none !important; }
  </style>
  {% block head %}{% endblock %}
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      x-data="{ toast:'' }"
      @toast.window="toast = $event.detail.value ?? $event.detail; clearTimeout(window._tt); window._tt = setTimeout(()=> toast='', 1900)"
      @htmx:after-request.window="if ($event.detail.xhr) { try { const t = JSON.parse($event.detail.xhr.getResponseHeader('HX-Trigger')||'{}').toast; if (t) { toast=t; clearTimeout(window._tt); window._tt=setTimeout(()=>toast='',1900);} } catch(e){} }">

  {% block body %}{% endblock %}

  <!-- Global toast -->
  <div x-cloak x-show="toast" x-transition.opacity
       style="position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:60;background:#1c1d20;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;box-shadow:0 8px 26px rgba(0,0,0,0.22);"
       x-text="toast"></div>
</body>
</html>
